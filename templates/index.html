<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyLens</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }
        header h1 span { color: #6c9fff; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
        }
        .controls select, .controls button {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
        }
        .controls button {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
            font-weight: 500;
        }
        .controls button:hover { background: #1d4ed8; }
        .controls button:disabled { opacity: 0.5; cursor: wait; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .panel {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
        }
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a2a;
            font-weight: 600;
            font-size: 15px;
        }
        .panel-body {
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        .timeline-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-item.skipped { opacity: 0.5; }
        .timeline-time {
            flex-shrink: 0;
            font-size: 13px;
            color: #888;
            width: 50px;
            padding-top: 2px;
        }
        .timeline-content { flex: 1; }
        .timeline-app {
            font-size: 12px;
            color: #6c9fff;
            margin-bottom: 4px;
        }
        .timeline-desc {
            font-size: 13px;
            line-height: 1.5;
            color: #ccc;
        }
        .timeline-thumb {
            width: 80px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            border: 1px solid #333;
            transition: border-color 0.2s, transform 0.2s;
        }
        .timeline-thumb:hover {
            border-color: #6c9fff;
            transform: scale(1.05);
        }
        .category-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #2a2a2a;
            color: #aaa;
            margin-top: 4px;
        }
        .category-badge.skipped {
            background: #3a2020;
            color: #f87171;
        }

        /* Summary markdown styles */
        .summary-content {
            font-size: 14px;
            line-height: 1.8;
            color: #ccc;
        }
        .summary-content h1, .summary-content h2, .summary-content h3 {
            color: #fff;
            margin: 16px 0 8px;
        }
        .summary-content h1 { font-size: 18px; }
        .summary-content h2 { font-size: 16px; }
        .summary-content h3 { font-size: 14px; }
        .summary-content ul, .summary-content ol { padding-left: 20px; margin: 8px 0; }
        .summary-content li { margin: 4px 0; }
        .summary-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }
        .summary-content th, .summary-content td {
            border: 1px solid #333;
            padding: 8px 12px;
            text-align: left;
        }
        .summary-content th {
            background: #252525;
            color: #fff;
            font-weight: 600;
        }
        .summary-content tr:nth-child(even) { background: #1e1e1e; }
        .summary-content blockquote {
            border-left: 3px solid #6c9fff;
            padding: 8px 16px;
            margin: 12px 0;
            background: #1e1e1e;
            border-radius: 0 6px 6px 0;
            color: #aaa;
        }
        .summary-content code {
            background: #252525;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        .summary-content hr {
            border: none;
            border-top: 1px solid #333;
            margin: 16px 0;
        }
        .summary-content p { margin: 8px 0; }
        .summary-content strong { color: #fff; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .status {
            font-size: 13px;
            color: #888;
        }
        .status.active { color: #4ade80; }

        /* Modal for screenshot zoom */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }
        .modal-overlay.show { display: flex; }
        .modal-overlay img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .modal-info {
            color: #888;
            font-size: 13px;
        }
        .modal-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 28px;
            padding: 16px 12px;
            cursor: pointer;
            border-radius: 8px;
            z-index: 101;
        }
        .modal-nav:hover { background: rgba(255,255,255,0.2); }
        .modal-nav.prev { left: 16px; }
        .modal-nav.next { right: 16px; }
        .modal-close {
            position: fixed;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            z-index: 101;
        }
        .modal-close:hover { color: #fff; }

        /* Search */
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .search-bar input {
            flex: 1;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 14px;
        }
        .search-bar input::placeholder { color: #555; }
        .search-bar button {
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
        }
        .search-bar button:hover { background: #252525; }
        .search-results {
            display: none;
            margin-bottom: 24px;
        }
        .search-results.show { display: block; }
        .search-results .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-close {
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            cursor: pointer;
        }
        .search-close:hover { color: #fff; }
        .highlight { background: #4a3a00; color: #ffd700; padding: 0 2px; border-radius: 2px; }
        .ocr-preview {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            max-height: 40px;
            overflow: hidden;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1>Daily<span>Lens</span></h1>
        <span class="status active" id="status">Monitoring</span>
    </header>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search OCR text and descriptions..." onkeydown="if(event.key==='Enter')doSearch()">
            <button onclick="doSearch()">Search</button>
        </div>

        <div class="search-results panel" id="searchResults">
            <div class="panel-header">
                <span id="searchTitle">Search Results</span>
                <button class="search-close" onclick="closeSearch()">&times;</button>
            </div>
            <div class="panel-body" id="searchBody" style="max-height:40vh"></div>
        </div>

        <div class="controls">
            <select id="dateSelect">
                {% for d in dates %}
                <option value="{{ d }}" {% if d == today %}selected{% endif %}>{{ d }}</option>
                {% endfor %}
                {% if not dates %}
                <option value="{{ today }}">{{ today }}</option>
                {% endif %}
            </select>
            <button id="summaryBtn" onclick="loadSummary()">일일 요약 생성</button>
            <button onclick="loadSummary(true)">요약 재생성</button>
        </div>

        <div class="grid">
            <div class="panel">
                <div class="panel-header">타임라인</div>
                <div class="panel-body" id="timeline">
                    <div class="empty-state">캡처 데이터를 불러오는 중...</div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">일일 요약</div>
                <div class="panel-body summary-content" id="summary">
                    <div class="empty-state">날짜를 선택하고 "일일 요약 생성" 버튼을 눌러주세요</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Screenshot zoom modal -->
    <div class="modal-overlay" id="modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <button class="modal-nav prev" onclick="navigateModal(-1)">&lsaquo;</button>
        <button class="modal-nav next" onclick="navigateModal(1)">&rsaquo;</button>
        <img id="modalImg" src="" alt="Screenshot">
        <div class="modal-info" id="modalInfo"></div>
    </div>

    <script>
        const dateSelect = document.getElementById('dateSelect');
        const timeline = document.getElementById('timeline');
        const summary = document.getElementById('summary');

        let currentCaptures = [];
        let currentModalIndex = -1;

        dateSelect.addEventListener('change', loadCaptures);

        async function loadCaptures() {
            const date = dateSelect.value;
            timeline.innerHTML = '<div class="empty-state">불러오는 중...</div>';

            try {
                const res = await fetch(`/api/captures/${date}`);
                const data = await res.json();
                currentCaptures = data.captures;

                if (!data.captures.length) {
                    timeline.innerHTML = '<div class="empty-state">이 날짜에 캡처된 데이터가 없습니다</div>';
                    return;
                }

                timeline.innerHTML = data.captures.map((c, i) => {
                    const time = c.timestamp.includes('T')
                        ? c.timestamp.split('T')[1].substring(0, 5)
                        : c.timestamp.substring(11, 16);
                    const isSkipped = c.category === '스킵됨';
                    return `
                        <div class="timeline-item${isSkipped ? ' skipped' : ''}">
                            <div class="timeline-time">${time}</div>
                            <div class="timeline-content">
                                <div class="timeline-app">${escapeHtml(c.app_name || '')}</div>
                                <div class="timeline-desc">${escapeHtml(c.description || '')}</div>
                                ${c.category ? `<span class="category-badge${isSkipped ? ' skipped' : ''}">${escapeHtml(c.category)}</span>` : ''}
                            </div>
                            ${c.screenshot_url && !isSkipped ? `<img class="timeline-thumb" src="${c.screenshot_url}" onclick="openModal(${i})" loading="lazy">` : ''}
                        </div>
                    `;
                }).join('');
            } catch (e) {
                timeline.innerHTML = '<div class="empty-state">데이터 로딩 실패</div>';
            }
        }

        async function loadSummary(regenerate = false) {
            const date = dateSelect.value;
            const btn = document.getElementById('summaryBtn');
            btn.disabled = true;
            summary.innerHTML = '<div class="empty-state">AI가 요약을 생성하는 중...</div>';

            try {
                const url = `/api/summary/${date}${regenerate ? '?regenerate=true' : ''}`;
                const res = await fetch(url);
                const data = await res.json();
                summary.innerHTML = markdownToHtml(data.summary);
            } catch (e) {
                summary.innerHTML = '<div class="empty-state">요약 생성 실패</div>';
            } finally {
                btn.disabled = false;
            }
        }

        // -- Modal (screenshot zoom with navigation) --
        function openModal(index) {
            currentModalIndex = index;
            updateModal();
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            currentModalIndex = -1;
        }

        function navigateModal(dir) {
            event.stopPropagation();
            const filtered = currentCaptures
                .map((c, i) => ({ ...c, _idx: i }))
                .filter(c => c.screenshot_url && c.category !== '스킵됨');

            const curPos = filtered.findIndex(c => c._idx === currentModalIndex);
            let newPos = curPos + dir;
            if (newPos < 0) newPos = filtered.length - 1;
            if (newPos >= filtered.length) newPos = 0;

            currentModalIndex = filtered[newPos]._idx;
            updateModal();
        }

        function updateModal() {
            const c = currentCaptures[currentModalIndex];
            if (!c) return;
            document.getElementById('modalImg').src = c.screenshot_url;
            const time = c.timestamp.includes('T')
                ? c.timestamp.split('T')[1].substring(0, 8)
                : c.timestamp.substring(11, 19);
            document.getElementById('modalInfo').textContent =
                `${time} - ${c.app_name || ''} (${c.category || ''})`;
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (currentModalIndex === -1) return;
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowLeft') navigateModal(-1);
            if (e.key === 'ArrowRight') navigateModal(1);
        });

        // -- Markdown rendering --
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function markdownToHtml(md) {
            const lines = md.split('\n');
            const html = [];
            let inList = false;
            let inOrderedList = false;
            let inTable = false;
            let inBlockquote = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];

                // Horizontal rule
                if (/^---+$/.test(line.trim())) {
                    closeOpenTags();
                    html.push('<hr>');
                    continue;
                }

                // Table detection: line with pipes
                if (line.includes('|') && line.trim().startsWith('|')) {
                    // Check if next line is separator
                    const nextLine = lines[i + 1] || '';
                    const isSeparator = /^\|[\s\-:|]+\|$/.test(nextLine.trim());

                    if (!inTable && isSeparator) {
                        closeOpenTags();
                        inTable = true;
                        html.push('<table>');
                        // Parse header
                        const headers = parsePipeLine(line);
                        html.push('<thead><tr>');
                        headers.forEach(h => html.push(`<th>${inlineMarkdown(h)}</th>`));
                        html.push('</tr></thead><tbody>');
                        i++; // skip separator line
                        continue;
                    } else if (inTable) {
                        const cells = parsePipeLine(line);
                        html.push('<tr>');
                        cells.forEach(c => html.push(`<td>${inlineMarkdown(c)}</td>`));
                        html.push('</tr>');
                        // Check if table ends
                        const nextContent = lines[i + 1] || '';
                        if (!nextContent.trim().startsWith('|')) {
                            inTable = false;
                            html.push('</tbody></table>');
                        }
                        continue;
                    }
                }

                // Close table if still open
                if (inTable && !line.trim().startsWith('|')) {
                    inTable = false;
                    html.push('</tbody></table>');
                }

                // Blockquote
                if (line.trim().startsWith('>')) {
                    if (!inBlockquote) {
                        closeOpenTags();
                        inBlockquote = true;
                        html.push('<blockquote>');
                    }
                    html.push(inlineMarkdown(line.replace(/^>\s*/, '')) + '<br>');
                    continue;
                } else if (inBlockquote) {
                    inBlockquote = false;
                    html.push('</blockquote>');
                }

                // Headings
                if (line.startsWith('### ')) {
                    closeOpenTags();
                    html.push(`<h3>${inlineMarkdown(line.slice(4))}</h3>`);
                    continue;
                }
                if (line.startsWith('## ')) {
                    closeOpenTags();
                    html.push(`<h2>${inlineMarkdown(line.slice(3))}</h2>`);
                    continue;
                }
                if (line.startsWith('# ')) {
                    closeOpenTags();
                    html.push(`<h1>${inlineMarkdown(line.slice(2))}</h1>`);
                    continue;
                }

                // Unordered list
                if (/^[\-\*] /.test(line.trim())) {
                    if (!inList) {
                        closeOpenTags();
                        inList = true;
                        html.push('<ul>');
                    }
                    html.push(`<li>${inlineMarkdown(line.replace(/^\s*[\-\*] /, ''))}</li>`);
                    continue;
                } else if (inList) {
                    inList = false;
                    html.push('</ul>');
                }

                // Ordered list
                if (/^\d+\.\s/.test(line.trim())) {
                    if (!inOrderedList) {
                        closeOpenTags();
                        inOrderedList = true;
                        html.push('<ol>');
                    }
                    html.push(`<li>${inlineMarkdown(line.replace(/^\s*\d+\.\s/, ''))}</li>`);
                    continue;
                } else if (inOrderedList) {
                    inOrderedList = false;
                    html.push('</ol>');
                }

                // Empty line
                if (line.trim() === '') {
                    closeOpenTags();
                    continue;
                }

                // Paragraph
                html.push(`<p>${inlineMarkdown(line)}</p>`);
            }

            closeOpenTags();
            return html.join('\n');

            function closeOpenTags() {
                if (inList) { html.push('</ul>'); inList = false; }
                if (inOrderedList) { html.push('</ol>'); inOrderedList = false; }
                if (inTable) { html.push('</tbody></table>'); inTable = false; }
                if (inBlockquote) { html.push('</blockquote>'); inBlockquote = false; }
            }
        }

        function inlineMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`(.+?)`/g, '<code>$1</code>');
        }

        function parsePipeLine(line) {
            return line.split('|').slice(1, -1).map(s => s.trim());
        }

        // -- Search --
        async function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;

            const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            const el = document.getElementById('searchResults');
            const body = document.getElementById('searchBody');

            document.getElementById('searchTitle').textContent =
                `Search: "${q}" (${data.count} results)`;

            if (!data.results.length) {
                body.innerHTML = '<div class="empty-state">No results found</div>';
            } else {
                body.innerHTML = data.results.map(c => {
                    const time = c.timestamp.includes('T')
                        ? c.timestamp.substring(0, 16).replace('T', ' ')
                        : c.timestamp.substring(0, 16);
                    const desc = highlightText(escapeHtml(c.description || ''), q);
                    const ocr = c.ocr_text
                        ? highlightText(escapeHtml(c.ocr_text.substring(0, 150)), q)
                        : '';
                    return `
                        <div class="timeline-item">
                            <div class="timeline-time" style="width:110px">${time}</div>
                            <div class="timeline-content">
                                <div class="timeline-app">${escapeHtml(c.app_name || '')}</div>
                                <div class="timeline-desc">${desc}</div>
                                ${ocr ? `<div class="ocr-preview">${ocr}</div>` : ''}
                                ${c.category ? `<span class="category-badge">${escapeHtml(c.category)}</span>` : ''}
                            </div>
                            ${c.screenshot_url ? `<img class="timeline-thumb" src="${c.screenshot_url}" onclick="showModal('${c.screenshot_url}')" loading="lazy">` : ''}
                        </div>
                    `;
                }).join('');
            }
            el.classList.add('show');
        }

        function closeSearch() {
            document.getElementById('searchResults').classList.remove('show');
        }

        function highlightText(text, query) {
            if (!query) return text;
            const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(re, '<span class="highlight">$1</span>');
        }

        function showModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('modal').classList.add('show');
            currentModalIndex = -1;
        }

        // Load captures on page load
        loadCaptures();
    </script>
</body>
</html>
